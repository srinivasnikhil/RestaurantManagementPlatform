<div class="admin">
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-mark">D</span>
      <span class="brand-text">Dosthi Admin</span>
    </div>

    <nav class="nav">
      <a routerLink="/admin/pos" routerLinkActive="active">New Order</a>
      <a routerLink="/admin/orders" routerLinkActive="active">Orders</a>
      <a routerLink="/admin/kitchen" routerLinkActive="active">Kitchen</a>
      @if (auth.isAdmin()) {
        <a routerLink="/admin/menu" routerLinkActive="active">Menu</a>
        <a routerLink="/admin/dashboard" routerLinkActive="active">Dashboard</a>
      }
    </nav>

    <div class="sidebar-foot">
      <span class="who">{{ auth.currentUser()?.name }}</span>
      <a routerLink="/" class="back-site">← Back to site</a>
      <button class="logout-btn" (click)="logout()">Log out</button>
    </div>
  </aside>

  <main class="content">
    <router-outlet />
  </main>
</div>

<header class="app-header">
  <a routerLink="/" class="brand">Dosthi Chowrastha</a>
  <nav>
    @if (auth.isAdmin() || auth.currentUser()?.role === 'Employee') {
      <a routerLink="/admin">Staff</a>
    }
    <a routerLink="/cart" class="cart-link">
      Cart
      @if (cart.itemCount() > 0) {
        <span class="badge">{{ cart.itemCount() }}</span>
      }
    </a>
  </nav>
</header>

<main>
  <router-outlet />
</main>
